<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>South Thailand – Land Use Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
/* ══════════════ Reset & Base ══════════════ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg0:#0f1117; --bg1:#171b26; --bg2:#1e2336; --bg3:#252d42;
  --bg4:#2d3650; --border:#2e3856; --border2:#3d4f72;
  --text0:#f0f2ff; --text1:#c8cfe8; --text2:#8a95b8; --text3:#556080;
  --accent:#4f8ef7; --accent2:#3a78e0; --success:#3ecf8e;
  --warn:#f59f00; --danger:#f03e3e; --info:#339af0;
  --radius:10px; --radius-sm:6px; --shadow:0 8px 32px rgba(0,0,0,.45)
}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans Thai','Inter',sans-serif;background:var(--bg0);color:var(--text1)}

/* ══════════════ Layout ══════════════ */
body{display:flex}
#sidebar{
  width:310px;min-width:260px;background:var(--bg1);
  display:flex;flex-direction:column;overflow:hidden;
  border-right:1px solid var(--border);
  box-shadow:4px 0 24px rgba(0,0,0,.4);z-index:900
}
#map-wrap{flex:1;position:relative;overflow:hidden}
#map{position:absolute;inset:0}

/* ══════════════ Sidebar Header ══════════════ */
#sb-header{
  padding:18px 18px 14px;background:linear-gradient(135deg,#1e2a4a,#1a2038);
  border-bottom:1px solid var(--border);flex-shrink:0
}
#sb-title{font-size:16px;font-weight:700;color:var(--text0);letter-spacing:.4px;margin-bottom:2px}
#sb-sub{font-size:11px;color:var(--text3);font-weight:300}

/* ══════════════ Scrollable body ══════════════ */
#sb-body{flex:1;overflow-y:auto;padding-bottom:16px}
#sb-body::-webkit-scrollbar{width:4px}
#sb-body::-webkit-scrollbar-track{background:transparent}
#sb-body::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

/* ══════════════ Section titles ══════════════ */
.sec-hd{
  display:flex;align-items:center;gap:8px;
  padding:14px 18px 7px;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:1.4px;color:var(--text3)
}
.sec-hd::after{content:'';flex:1;height:1px;background:var(--border)}

/* ══════════════ Collapsible layer group ══════════════ */
.group-wrap{margin:5px 12px 0}
.group-toggle-btn{
  width:100%;display:flex;align-items:center;gap:8px;
  padding:9px 10px;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text1);font-family:inherit;
  font-size:12.5px;font-weight:600;cursor:pointer;transition:border-color .2s
}
.group-toggle-btn:hover{border-color:var(--border2)}
.group-toggle-btn.open{border-radius:var(--radius) var(--radius) 0 0;border-color:var(--border2)}
.group-chevron{display:inline-block;transition:transform .2s;color:var(--text3);font-size:10px}
.group-toggle-btn.open .group-chevron{transform:rotate(90deg)}
.group-count{margin-left:auto;font-size:10px;color:var(--text3);font-weight:400}
.group-body{
  max-height:0;overflow:hidden;transition:max-height .3s ease;
  border:1px solid var(--border);border-top:0;border-radius:0 0 var(--radius) var(--radius)
}
.group-body.open{max-height:900px}
.group-body .layer-card{margin:5px 8px}
.group-body .layer-card:last-child{margin-bottom:8px}

/* ══════════════ Base map pills ══════════════ */
.base-wrap{display:flex;gap:6px;padding:4px 18px 10px}
.base-pill{
  flex:1;padding:6px 4px;text-align:center;border:1px solid var(--border2);
  border-radius:20px;cursor:pointer;font-size:11px;color:var(--text2);
  background:var(--bg2);transition:all .2s;user-select:none
}
.base-pill.active,.base-pill:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.base-pill input{display:none}

/* ══════════════ Layer card ══════════════ */
.layer-card{
  margin:5px 12px;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;transition:border-color .2s
}
.layer-card.active{border-color:var(--accent)}
.layer-card:hover{border-color:var(--border2)}

.lc-head{
  display:flex;flex-wrap:wrap;align-items:center;gap:6px 10px;padding:10px 12px 8px;cursor:default
}
.lc-title-row{display:flex;align-items:center;gap:8px;flex:1 1 140px;min-width:140px}
.lc-icon{font-size:16px;flex-shrink:0;line-height:1}
.lc-dot{
  width:9px;height:9px;border-radius:50%;background:var(--text3);
  flex-shrink:0;transition:background .3s
}
.layer-card.active .lc-dot{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.lc-name{flex:1;font-size:13px;font-weight:500;color:var(--text1);line-height:1.4}
.lc-actions{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.lc-toggle{
  width:38px;height:20px;background:var(--bg4);border-radius:10px;
  position:relative;cursor:pointer;transition:background .25s;flex-shrink:0
}
.lc-toggle.on{background:var(--accent)}
.lc-toggle::after{
  content:'';width:16px;height:16px;background:#fff;border-radius:50%;
  position:absolute;top:2px;left:2px;transition:left .25s;
  box-shadow:0 1px 4px rgba(0,0,0,.3)
}
.lc-toggle.on::after{left:20px}

/* Opacity slider row */
.op-row{display:flex;align-items:center;gap:10px;padding:0 12px 6px;font-size:11px;color:var(--text3)}
.op-row input[type=range]{
  flex:1;-webkit-appearance:none;height:3px;border-radius:2px;
  background:var(--bg4);outline:none;cursor:pointer
}
.op-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:var(--accent);cursor:pointer;box-shadow:0 0 4px rgba(79,142,247,.5)
}
.op-val{width:30px;text-align:right;font-variant-numeric:tabular-nums}

/* Edit btn */
.cls-toggle-btn{
  padding:2px 9px;background:transparent;border:1px solid var(--border2);
  color:var(--text3);border-radius:20px;cursor:pointer;font-size:10px;
  font-family:inherit;transition:all .2s;margin-left:2px
}
.cls-toggle-btn:hover,.cls-toggle-btn.open{border-color:var(--accent);color:var(--accent)}

/* Class editor panel */
.cls-panel{
  max-height:0;overflow:hidden;transition:max-height .3s ease;background:var(--bg1);
  border-top:0px solid var(--border)
}
.cls-panel.open{max-height:300px;border-top:1px solid var(--border)}
.cls-inner{padding:8px 12px 10px}

.cls-legend-header{
  font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;
  padding:2px 0 6px;margin-bottom:4px;border-bottom:1px solid var(--border)
}
.cls-row{display:flex;align-items:center;gap:8px;padding:4px 0}
.cls-num{
  width:18px;font-size:11px;color:var(--text3);text-align:right;flex-shrink:0
}
.cls-swatch{
  width:22px;height:22px;border-radius:5px;cursor:pointer;
  border:2px solid rgba(255,255,255,.15);flex-shrink:0;
  position:relative;overflow:hidden;transition:transform .15s
}
.cls-swatch:hover{transform:scale(1.15)}
.cls-swatch input[type=color]{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%
}
.cls-label-inp{
  flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text1);
  padding:4px 8px;border-radius:var(--radius-sm);font-size:11px;font-family:inherit
}
.cls-label-inp:focus{outline:none;border-color:var(--accent);background:var(--bg4)}

/* ══════════════ Boundary toggle rows ══════════════ */
.bound-row{
  display:flex;align-items:center;gap:10px;margin:5px 12px;padding:9px 12px;
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius)
}
.bound-swatch-wrap{position:relative;cursor:pointer;flex-shrink:0;transition:transform .15s}
.bound-swatch-wrap:hover{transform:scale(1.15)}
.bound-swatch{
  display:block;width:22px;height:22px;border-radius:5px;pointer-events:none;
  border:2px solid rgba(255,255,255,.15)
}
.bound-cp{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.bound-name{flex:1;font-size:13px;color:var(--text1)}

/* ══════════════ Swipe compare box ══════════════ */
.swipe-box{
  margin:5px 12px 0;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 12px;display:flex;flex-direction:column;gap:9px
}
.swipe-row{display:flex;align-items:center;gap:10px}
.swipe-row-label{font-size:11.5px;color:var(--text2);flex-shrink:0;width:52px}
.swipe-sel{
  flex:1;min-width:0;background:var(--bg3);color:var(--text1);border:1px solid var(--border2);
  border-radius:var(--radius-sm);padding:5px 8px;font-size:12px;font-family:inherit;
  cursor:pointer;outline:none
}
.swipe-sel:disabled{opacity:.5;cursor:not-allowed}
/* optgroup label (Thai layer name) large & bold; the Natural Breaks/Manual Interval
   options underneath it smaller -- browser support for styling the
   native <select> popup this way varies, but is solid in Chrome/Edge/Firefox */
.swipe-sel optgroup{font-size:14px;font-weight:700;font-style:normal;color:var(--text0)}
.swipe-sel option{font-size:11px;font-weight:400;color:var(--text1)}
.swipe-fixed{
  background:var(--bg1);color:var(--text2);border:1px dashed var(--border2);
  border-radius:var(--radius-sm);padding:5px 8px;font-size:12px;cursor:default
}
.swipe-side-grp{
  display:flex;flex-direction:column;gap:6px;padding-top:8px;
  border-top:1px solid var(--border)
}
.swipe-side-hd{
  font-size:10px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:.06em
}

/* ══════════════ Swipe divider (overlaid on the map) ══════════════ */
#swipe-divider{
  position:absolute;top:0;bottom:0;width:16px;margin-left:-8px;
  z-index:1000;display:none;cursor:ew-resize;touch-action:none
}
#swipe-divider.active{display:block}
#swipe-divider-line{
  position:absolute;left:7px;top:0;bottom:0;width:2px;
  background:#fff;box-shadow:0 0 6px rgba(0,0,0,.6)
}
#swipe-divider-handle{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:34px;height:34px;border-radius:50%;background:var(--accent);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:15px;box-shadow:0 2px 10px rgba(0,0,0,.5);user-select:none
}
#swipe-labels{
  position:absolute;top:10px;left:0;right:0;display:none;
  justify-content:space-between;padding:0 12px;z-index:999;pointer-events:none
}
#swipe-labels.active{display:flex}
.swipe-label{
  background:rgba(15,17,23,.8);backdrop-filter:blur(4px);
  color:var(--text1);font-size:11px;padding:4px 10px;border-radius:20px;
  border:1px solid var(--border2);max-width:45%;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap
}

/* ══════════════ Grid info box ══════════════ */
.grid-info-box{
  margin:5px 12px 0;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 13px;font-size:12px;color:var(--text2);
  line-height:1.7
}
.grid-hint{font-size:11px;color:var(--text3);margin-top:3px}

/* ══════════════ Loading overlay ══════════════ */
#loading{
  position:fixed;inset:0;background:rgba(10,12,20,.9);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  backdrop-filter:blur(4px)
}
#loading.hidden{display:none}
#load-bar-wrap{
  position:relative;width:220px;height:6px;background:var(--bg4);
  border-radius:4px;overflow:hidden;margin-bottom:14px
}
#load-bar-fill{height:100%;width:0%;background:var(--accent);border-radius:4px;transition:width .15s ease}
#load-bar-wrap.indeterminate #load-bar-fill{
  width:40%!important;position:absolute;top:0;animation:load-indet 1.1s ease-in-out infinite
}
@keyframes load-indet{0%{left:-40%}100%{left:100%}}
#load-msg{font-size:13px;color:var(--text2);letter-spacing:.3px}
#load-pct{font-size:11px;color:var(--text3);margin-top:6px;font-variant-numeric:tabular-nums}

/* ══════════════ Popup ══════════════ */
.leaflet-popup-content-wrapper{
  background:var(--bg1)!important;border:1px solid var(--border2)!important;
  border-radius:12px!important;box-shadow:var(--shadow)!important;padding:0!important
}
.leaflet-popup-content{margin:0!important;min-width:220px}
.leaflet-popup-tip-container{display:none}
.leaflet-popup-close-button{color:var(--text3)!important;top:10px!important;right:10px!important;font-size:18px!important}

.gpopup-wrap{padding:14px 16px 14px;min-width:340px}
.gpopup-title{
  font-size:13px;font-weight:600;color:var(--text0);
  display:flex;align-items:center;gap:8px;margin-bottom:12px;
  padding-bottom:9px;border-bottom:1px solid var(--border)
}
.gpopup-title .coord{font-size:10px;color:var(--text3);font-weight:400}
.gp-table{width:100%;border-collapse:collapse}
.gp-table tr{transition:background .15s}
.gp-table tr:hover{background:rgba(255,255,255,.03)}
.gp-table td{padding:5px 4px;vertical-align:middle}
.gp-field{
  font-size:11px;font-weight:600;color:var(--text3);white-space:nowrap;
  padding-right:14px!important;width:55%
}
.badge{
  display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
  border-radius:20px;color:#fff;font-weight:600;font-size:11px;
  white-space:nowrap
}
.badge-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.6);flex-shrink:0}
.gp-suit-box{
  margin-top:6px;padding:6px 10px 2px;border:1px solid var(--border);border-radius:8px;
  background:rgba(255,255,255,.02)
}
.gp-table-sm .gp-field{font-size:10px}
.gp-table-sm .badge{font-size:10px;padding:2px 8px}

/* ══════════════ Status bar ══════════════ */
#statusbar{
  position:absolute;bottom:0;right:0;z-index:800;
  background:rgba(15,17,23,.75);backdrop-filter:blur(4px);
  color:var(--text3);font-size:11px;padding:4px 12px;
  border-top-left-radius:8px;font-variant-numeric:tabular-nums;
  border-left:1px solid var(--border);border-top:1px solid var(--border)
}

/* ══════════════ Mobile / tablet layout ══════════════ */
#sidebar-toggle{display:none}
#sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:940}

@media (max-width:860px){
  #sidebar-toggle{
    display:flex;align-items:center;justify-content:center;
    position:fixed;bottom:18px;left:16px;z-index:1000;
    width:46px;height:46px;border-radius:50%;background:var(--bg2);
    border:1px solid var(--border2);color:var(--text0);font-size:20px;
    font-family:inherit;padding:0;-webkit-appearance:none;appearance:none;
    cursor:pointer;box-shadow:var(--shadow)
  }
  #sidebar{
    position:fixed;top:0;left:0;bottom:0;z-index:950;
    width:85vw;max-width:320px;min-width:0;
    transform:translateX(-100%);transition:transform .25s ease
  }
  body.sidebar-open #sidebar{transform:translateX(0)}
  body.sidebar-open #sidebar-backdrop{display:block}
  #map-wrap{width:100%}
  .gpopup-wrap{min-width:0;width:min(320px,calc(100vw - 56px))}
  #statusbar{font-size:10px;padding:3px 8px}
}

@media (max-width:420px){
  .gpopup-wrap{padding:12px 14px 12px}
  .lc-toggle{width:36px;height:19px}
}

/* ══════════════ Zonal statistics panel ══════════════ */
#zonal-panel{
  display:none;position:fixed;top:16px;right:16px;z-index:960;
  width:300px;max-height:calc(100vh - 32px);overflow-y:auto;
  background:var(--bg1);border:1px solid var(--border2);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:16px 16px 14px
}
#zonal-panel.open{display:block}
#zonal-panel::-webkit-scrollbar{width:4px}
#zonal-panel::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
.zp-close{
  position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:7px;
  background:transparent;border:none;color:var(--text3);font-size:14px;cursor:pointer;
  font-family:inherit
}
.zp-close:hover{color:var(--text1);background:var(--bg3)}
.zp-loading{font-size:12px;color:var(--text3);padding:4px 2px}
.zp-title{font-size:13.5px;font-weight:700;color:var(--text0);padding-right:24px;margin-bottom:2px;
  display:flex;align-items:center;gap:6px}
.zp-sub{font-size:11px;color:var(--text3);padding-bottom:10px;border-bottom:1px solid var(--border);
  margin-bottom:8px;font-variant-numeric:tabular-nums;display:flex;align-items:center;justify-content:space-between;gap:8px}
.zp-pin-badge{
  flex-shrink:0;font-size:10px;padding:2px 8px;border-radius:20px;cursor:pointer;
  background:var(--bg3);color:var(--text3);border:1px solid var(--border2);white-space:nowrap
}
.zp-pin-badge.pinned{background:var(--accent);color:#fff;border-color:var(--accent)}
.zp-section{
  margin-top:8px;padding:9px 10px;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);transition:border-color .15s
}
.zp-section:hover{border-color:var(--border2)}
.zp-section-title{
  display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;
  font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;
  letter-spacing:.05em;padding-bottom:5px;margin-bottom:6px;border-bottom:1px solid var(--border)
}
.zp-section.collapsed .zp-section-title{padding-bottom:0;margin-bottom:0;border-bottom:0}
.zp-section-title:hover{color:var(--text1)}
.zp-chevron{display:inline-block;transition:transform .18s;font-size:9px;flex-shrink:0}
.zp-section.collapsed .zp-chevron{transform:rotate(-90deg)}
.zp-section-body{overflow:hidden}
.zp-section.collapsed .zp-section-body{display:none}
.zp-top-summary{
  display:none;align-items:center;gap:6px;cursor:pointer;padding:2px 0 0;
  font-size:11.5px;color:var(--text1)
}
.zp-section.collapsed .zp-top-summary{display:flex}
.zp-row{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text1);padding:2px 0}
.zp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.zp-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.zp-pct{font-variant-numeric:tabular-nums;color:var(--text2);flex-shrink:0}
.zp-bar-track{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin:2px 0 5px}
.zp-bar-fill{height:100%;border-radius:2px}

@media (max-width:600px){
  #zonal-panel{width:calc(100vw - 32px);right:16px;left:16px;top:70px}
}

/* ══════════════ Guided tutorial ══════════════ */
#tutorial-help-btn{
  position:fixed;right:16px;bottom:16px;z-index:970;
  width:40px;height:40px;border-radius:50%;background:var(--bg2);
  border:1px solid var(--border2);color:var(--text1);font-size:18px;font-weight:700;
  cursor:pointer;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;
  font-family:inherit;padding:0;transition:border-color .2s,color .2s
}
#tutorial-help-btn:hover{border-color:var(--accent);color:var(--accent)}

#tutorial-overlay{display:none;position:fixed;inset:0;z-index:9400}
#tutorial-overlay.open{display:block}
#tutorial-block{position:fixed;inset:0}
#tutorial-spotlight{
  position:fixed;top:0;left:0;width:0;height:0;border-radius:10px;border:2px solid var(--accent);
  box-shadow:0 0 0 9999px rgba(5,7,14,.78);
  pointer-events:none;transition:top .25s ease,left .25s ease,width .25s ease,height .25s ease;
  z-index:9401
}
#tutorial-spotlight.hidden{visibility:hidden}
#tutorial-tooltip{
  position:fixed;top:0;left:0;z-index:9402;width:300px;max-width:calc(100vw - 32px);
  background:var(--bg1);border:1px solid var(--border2);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:16px 16px 14px;
  transition:top .25s ease,left .25s ease
}
#tt-step-count{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
#tt-title{font-size:15px;font-weight:700;color:var(--text0);margin-bottom:6px}
#tt-body{font-size:12.5px;color:var(--text2);line-height:1.6;margin-bottom:14px}
#tt-actions{display:flex;align-items:center;justify-content:space-between;gap:10px}

// Dataset pill switch -- 2 independent rows (score type, method) combine
// into one of 4 datasets. Rather than try to reload each currently-on
// layer in place (which looked like it was still showing the old
// dataset's data), just turn everything off -- the user re-toggles
// whatever they want to see, which always fetches fresh via the normal
// ensureLoaded/buildGeoLayer path (already correctly keyed by dataset).
async function reloadForDatasetChange(){
  map.closePopup();
  if(cellRect){ map.removeLayer(cellRect); cellRect=null; }

  for(const cfg of LAYERS){
    if(!layerOn[cfg.id]) continue;
    if(geoLayers[cfg.id]) map.removeLayer(geoLayers[cfg.id]);
    geoLayers[cfg.id]=null; // must clear, not just remove from map -- otherwise
                            // re-toggling this layer on reuses the stale instance
                            // (built from the OLD dataset's cached georaster)
    layerOn[cfg.id]=false;
    const card=document.getElementById('card-'+cfg.id);
    card?.querySelector('.lc-toggle')?.classList.remove('on');
    card?.classList.remove('active');
  }

  await loadGridAttr();

  if(lastZonal&&document.getElementById('zonal-panel').classList.contains('open')){
    showZonalStats(lastZonal.levelTitle,lastZonal.name,lastZonal.levelKey,lastZonal.code,zonalPinned);
  }

  // NOTE: the swipe tool's own per-side dataset selects are intentionally
  // left untouched here -- they're an independent choice from this main
  // tab (that's the whole point: comparing across datasets, not just layers)
}

    document.querySelectorAll('#scoretype-wrap .base-pill').forEach(p=>p.classList.remove('active'));
    el.classList.add('active');
    currentScoreType=val;

// ─────────────────────────────────────────────────────────────────────────────
//  Raster layer state
// ─────────────────────────────────────────────────────────────────────────────
// rastCache is keyed by "<dataset>::<layerId>" so switching datasets never
// serves a stale raster from the other classification method. dataset is
// optional everywhere below -- defaults to the globally-selected tab, but
// the swipe tool passes its own per-side dataset explicitly so each side
// can show a different classification method independent of the main tab.
const rastCache={}, geoLayers={}, layerOn={}, layerOp={};
function cacheKey(id,dataset){ return `${dataset||currentDatasetKey()}::${id}`; }

function makeColorFn(id){
  const cfg=LAYERS.find(l=>l.id===id);
  return vals=>{
    const v=vals[0];
    if(!v) return null;
    return cfg.classes[v]?.color||null;
  };
}

function buildGeoLayer(id,paneName,dataset){
  const gr=rastCache[cacheKey(id,dataset)];
  const cfg=LAYERS.find(l=>l.id===id);
  if(!gr) return null;
  const opts={
    georaster:gr,
    pixelValuesToColorFn:makeColorFn(id),
    opacity:layerOp[id]??0.75,
    resolution:256,
  };
  if(paneName) opts.pane=paneName;
  return new GeoRasterLayer(opts);
}

function refreshLayer(id){
  const was=layerOn[id];
  if(geoLayers[id]) map.removeLayer(geoLayers[id]);
  geoLayers[id]=buildGeoLayer(id);
  if(was&&geoLayers[id]) geoLayers[id].addTo(map);
}

async function ensureLoaded(id,dataset){
  if(rastCache[cacheKey(id,dataset)]) return true;
  const cfg=LAYERS.find(l=>l.id===id);
  setLoading(true,`โหลด ${cfg.title}...`);
  try{
    const buf=await fetchWithProgress(`${datasetPath(cfg.file,dataset)}?v=${DATA_VERSION}`,setLoadingProgress);
    rastCache[cacheKey(id,dataset)]=await parseGeoraster(buf);
    return true;
  }catch(e){
    alert(`ไม่พบไฟล์ ${datasetPath(cfg.file,dataset)}\nกรุณารัน prepare_web.py ก่อน`);
    return false;
  }finally{setLoading(false)}
}

        <span class="cls-num">${k}</span>
        <label class="cls-swatch" style="background:${v.color}" title="เลือกสี">
          <input type="color" value="${v.color}" data-id="${cfg.id}" data-k="${k}" class="cp">
        </label>
        <input type="text" class="cls-label-inp" value="${v.label}"
               data-id="${cfg.id}" data-k="${k}" placeholder="ชื่อ class">
      </div>`).join('');

    card.innerHTML=`

        </div>
        <div class="lc-actions">

          <div class="lc-toggle" data-id="${cfg.id}"></div>
        </div>
      </div>
      <div class="op-row">
        <span>ความทึบ</span>
        <input type="range" min="0" max="100" value="${Math.round(cfg.opacity*100)}"
               class="op-sl" data-id="${cfg.id}">

      </div>
    `;
    let parent=list;
    if(cfg.group){
      if(!groups[cfg.group]){
        const count=LAYERS.filter(l=>l.group===cfg.group).length;
        const wrap=document.createElement('div');
        wrap.className='group-wrap';
        wrap.id='group-wrap-'+cfg.group;
        const head=document.createElement('button');
        head.type='button';
        head.className='group-toggle-btn';
        head.innerHTML=`<span class="group-chevron">▸</span><span>${GROUP_TITLES[cfg.group]||cfg.group}</span><span class="group-count">${count}</span>`;
        const body=document.createElement('div');

        head.addEventListener('click',()=>{

        if(!ok) return;
        // always rebuild rather than reuse a cached instance -- if the
        // dataset changed since this layer was last built, geoLayers[cfg.id]
        // would still be showing the OLD dataset's tiles otherwise

// ─────────────────────────────────────────────────────────────────────────────
//  Swipe compare tool -- pick any two raster layers and drag a divider
//  between them. Each side is rendered in its own dedicated Leaflet pane,
//  clipped with the legacy CSS `clip: rect(...)` property (not clip-path --
//  Leaflet's pane <div>s have no intrinsic width/height of their own since
//  their content is all absolutely-positioned tiles, so a border-box-relative
//  clip-path would clip against a collapsed 0x0 box; the deprecated `clip`
//  property clips the painted region directly and is what every existing
//  Leaflet swipe plugin relies on for exactly this reason).
// ─────────────────────────────────────────────────────────────────────────────
let swipeOn=false;
let swipeLeftId=null, swipeRightId=null;
let swipeLeftDataset=null, swipeRightDataset=null; // per-side dataset override,
  // independent of the main "ชุดข้อมูล" tab -- lets each side show a different
  // classification method (e.g. Natural Breaks left vs Manual Interval right)
let swipeLeftLayer=null, swipeRightLayer=null;
let swipeDividerFrac=0.5; // 0..1, fraction of map width from the left edge

function ensureSwipePanes(){
  if(!map.getPane('swipeLeftPane')){
    map.createPane('swipeLeftPane').style.zIndex=460;
    map.createPane('swipeRightPane').style.zIndex=461;
  }
}

function updateSwipeClip(){
  if(!swipeOn) return;
  const size=map.getSize();
  const bounds=map.getBounds();
  const nw=map.latLngToLayerPoint(bounds.getNorthWest());
  const se=map.latLngToLayerPoint(bounds.getSouthEast());
  const x=size.x*swipeDividerFrac;
  const clipX=nw.x+x;
  const leftPane=map.getPane('swipeLeftPane');
  const rightPane=map.getPane('swipeRightPane');
  if(leftPane) leftPane.style.clip=`rect(${nw.y}px,${clipX}px,${se.y}px,${nw.x}px)`;
  if(rightPane) rightPane.style.clip=`rect(${nw.y}px,${se.x}px,${se.y}px,${clipX}px)`;
  const divider=document.getElementById('swipe-divider');
  if(divider) divider.style.left=x+'px';
}

function setSwipeLabel(side,id,dataset){
  const cfg=LAYERS.find(l=>l.id===id);
  const el=document.getElementById('swipe-label-'+side);
  if(el) el.textContent=cfg?`${cfg.title} · ${DATASET_LABELS[dataset]||dataset}`:'';
}

async function setSwipeSide(side,id,dataset){
  ensureSwipePanes();
  const paneName=side==='left'?'swipeLeftPane':'swipeRightPane';
  const old=side==='left'?swipeLeftLayer:swipeRightLayer;
  if(old) map.removeLayer(old);
  setSwipeLabel(side,id,dataset);
  if(side==='left') swipeLeftDataset=dataset; else swipeRightDataset=dataset;
  if(!id) return;
  const ok=await ensureLoaded(id,dataset);
  if(!ok) return;
  const layer=buildGeoLayer(id,paneName,dataset);
  layer?.addTo(map);
  if(side==='left') swipeLeftLayer=layer; else swipeRightLayer=layer;
  updateSwipeClip();
}

async function enableSwipe(){
  if(swipeOn) return;
  swipeOn=true;
  ensureSwipePanes();
  document.getElementById('swipe-divider').classList.add('active');
  document.getElementById('swipe-labels').classList.add('active');
  await setSwipeSide('left',swipeLeftId,swipeLeftDataset);
  await setSwipeSide('right',swipeRightId,swipeRightDataset);
  updateSwipeClip();
}

function disableSwipe(){
  swipeOn=false;
  if(swipeLeftLayer){ map.removeLayer(swipeLeftLayer); swipeLeftLayer=null; }
  if(swipeRightLayer){ map.removeLayer(swipeRightLayer); swipeRightLayer=null; }
  document.getElementById('swipe-divider').classList.remove('active');
  document.getElementById('swipe-labels').classList.remove('active');
}

map.on('move zoom resize',updateSwipeClip);

function buildSwipeControls(){
  // Left side is permanently pinned to "การใช้ที่ดินปัจจุบัน" (LU_classify).
  // Actual observed land use is the SAME single source file copied into
  // every one of the 4 dataset folders, so which one this reads from is
  // arbitrary -- it's the fixed baseline every other layer gets compared
  // against, not a real choice.
  swipeLeftId='LU_classify';
  swipeLeftDataset='raw_natural_breaks';

  // Right side is one grouped dropdown: each of the two outputs that actually
  // change between datasets (Alloc_LU, LU_Consistency) is a non-selectable
  // <optgroup> header, with all 4 score-type x method combinations as the
  // selectable options underneath it -- so picking an option sets BOTH the
  // layer and the dataset in one click. The option value packs both as
  // "<layerId>::<datasetKey>".
  const SWIPE_RIGHT_IDS=['Alloc_LU','LU_Consistency'];
  const rightSel=document.getElementById('swipe-right-sel');
  // Option text repeats the layer name ("ความเหมาะสมรวม - คะแนนดิบ - Natural
  // Breaks") rather than just the dataset name -- a native <select>'s closed
  // box can only ever show the selected <option>'s own text, never the
  // optgroup label above it, so the full context has to live in the option.
  const datasetKeys=SCORE_TYPES.flatMap(st=>METHODS.map(m=>`${st}_${m}`));
  const groupsHtml=SWIPE_RIGHT_IDS.map(id=>{
    const cfg=LAYERS.find(l=>l.id===id);
    const opts=datasetKeys.map(d=>`<option value="${id}::${d}">${cfg.title} - ${DATASET_LABELS[d]}</option>`).join('');
    return `<optgroup label="${cfg.title}">${opts}</optgroup>`;
  }).join('');
  rightSel.innerHTML=groupsHtml;
  rightSel.value=`Alloc_LU::${currentDatasetKey()}`;
  [swipeRightId,swipeRightDataset]=rightSel.value.split('::');

  rightSel.addEventListener('change',async()=>{
    [swipeRightId,swipeRightDataset]=rightSel.value.split('::');
    if(swipeOn) await setSwipeSide('right',swipeRightId,swipeRightDataset);
  });

  const tog=document.getElementById('swipe-toggle');
  tog.addEventListener('click',async()=>{
    if(!swipeOn){
      tog.classList.add('on');
      setLoading(true,'กำลังโหลดเลเยอร์เปรียบเทียบ...');
      try{ await enableSwipe(); } finally{ setLoading(false); }
    }else{
      tog.classList.remove('on');
      disableSwipe();
    }
  });
}

// Divider drag (mouse + touch) -- grabbing the handle stops map panning
// underneath it and drags the split position instead
(function(){
  const divider=document.getElementById('swipe-divider');
  let dragging=false;
  const start=e=>{
    if(!swipeOn) return;
    dragging=true;
    map.dragging.disable();
    e.preventDefault();
    e.stopPropagation();
  };
  const move=e=>{
    if(!dragging) return;
    const rect=document.getElementById('map-wrap').getBoundingClientRect();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    let x=clientX-rect.left;
    x=Math.max(0,Math.min(rect.width,x));
    swipeDividerFrac=rect.width?x/rect.width:0.5;
    updateSwipeClip();
  };
  const end=()=>{
    if(!dragging) return;
    dragging=false;
    map.dragging.enable();
  };
  divider.addEventListener('mousedown',start);
  divider.addEventListener('touchstart',start,{passive:false});
  window.addEventListener('mousemove',move);
  window.addEventListener('touchmove',move,{passive:false});
  window.addEventListener('mouseup',end);
  window.addEventListener('touchend',end);
})();

// ─────────────────────────────────────────────────────────────────────────────
//  Admin boundary lines (จังหวัด/อำเภอ/ตำบล -- province darkest & thickest,
//  district medium, tambon lightest & thinnest)
// ─────────────────────────────────────────────────────────────────────────────
const BOUNDS=[

  { id:'district', levelKey:'d', title:'อำเภอ',   file:'data/bound_district.geojson', color:'#3d3d3d', weight:1.4, opacity:0.75, dash:null, hoverFill:true },
  { id:'tambon',   levelKey:'t', title:'ตำบล',    file:'data/bound_tambon.geojson',   color:'#6e6e6e', weight:0.7, opacity:0.5, dash:null, hoverFill:true },
];
// coarsest -> finest; re-applied after every toggle so the finest active layer's
// full-area hover always wins over a coarser one covering the same ground
const BOUND_Z_ORDER=['province','district','tambon'];
function reorderBoundLayers(){
  BOUND_Z_ORDER.forEach(id=>{
    if(boundOn[id]&&boundLayers[id]) boundLayers[id].bringToFront();
  });
}
const boundLayers={};
const boundOn={};

function buildBoundList(){

        <input type="color" value="${cfg.color}" class="bound-cp" data-id="${cfg.id}">

    row.querySelector('.bound-cp').addEventListener('input',e=>{
      cfg.color=e.target.value;

    });

    const tog=row.querySelector('.lc-toggle');
    tog.addEventListener('click',async()=>{
      if(!boundOn[cfg.id]){
        if(!boundLayers[cfg.id]){
          setLoading(true,`โหลดเขต${cfg.title}...`);
          try{
            const buf=await fetchWithProgress(`${cfg.file}?v=${DATA_VERSION}`,setLoadingProgress);
            const gj=JSON.parse(new TextDecoder('utf-8').decode(buf));
            boundLayers[cfg.id]=L.geoJSON(gj,{
              style:{color:cfg.color,weight:cfg.weight,opacity:cfg.opacity,
                     fill:!!cfg.hoverFill,fillColor:cfg.color,fillOpacity:cfg.hoverFill?0.02:0,
                     dashArray:cfg.dash||null},
              onEachFeature:(f,layer)=>{
                if(f.properties&&f.properties.name){
                  layer.bindTooltip(f.properties.name,{sticky:true});
                  layer.on('mouseover',()=>{
                    if(!zonalPinned) showZonalStats(cfg.title,f.properties.name,cfg.levelKey,f.properties.code,false);
                  });
                  layer.on('click',e=>{
                    showZonalStats(cfg.title,f.properties.name,cfg.levelKey,f.properties.code,true);
                    handleGridClick(e);
                  });
                }
              }
            });
          }catch(e){ alert(`ไม่พบไฟล์ ${cfg.file}`); return; } finally{ setLoading(false); }
        }
        boundOn[cfg.id]=true;
        boundLayers[cfg.id].addTo(map);

        reorderBoundLayers();

        map.removeLayer(boundLayers[cfg.id]);

      }
    });

}

// ─────────────────────────────────────────────────────────────────────────────
//  Grid attribute lookup (HTTP Range request)
// ─────────────────────────────────────────────────────────────────────────────
let gridMeta=null;
let cellRect=null;
let gridBytes=null; // whole grid_attr.bin loaded once, not fetched per click
let tambonIndexArr=null; // whole tambon_index.bin loaded once (Uint16Array, same NR x NC grid)
let tambonLookup=null;   // [{i,t,d,p,r0,r1,c0,c1}, ...] -- one row per unique tambon

// grid_attr.bin is per-dataset (its 7 fields come from that dataset's own
// tifs); cached per dataset so switching back and forth doesn't re-fetch.
const gridBytesCache={};
async function loadGridAttr(){
  const key=currentDatasetKey();
  if(gridBytesCache[key]){ gridBytes=gridBytesCache[key]; return; }
  try{
    // Range requests depend on the static file server supporting byte ranges
    // (many simple local servers, e.g. Python's http.server, silently ignore
    // Range and return the WHOLE file with status 200 every time -- which
    // reads as "grid cell (0,0)" no matter where you click). Loading the file
    // once and indexing it locally sidesteps that entirely.
    setLoading(true,'กำลังโหลดข้อมูลกริด...');
    const buf=await fetchWithProgress(`${datasetPath('grid_attr.bin')}?v=${DATA_VERSION}`,setLoadingProgress);
    gridBytes=new Uint8Array(buf);
    gridBytesCache[key]=gridBytes;
  }catch(e){ console.warn('grid_attr.bin not found'); }
  finally{ setLoading(false); }
}

async function initGrid(){
  try{
    const r=await fetch(`data/grid_meta.json?v=${DATA_VERSION}`);
    if(r.ok) gridMeta=await r.json();
  }catch(e){ console.warn('grid_meta.json not found'); }
  await loadGridAttr();
  try{
    setLoading(true,'กำลังโหลดดัชนีเขตปกครอง...');
    const idxBuf=await fetchWithProgress(`data/tambon_index.bin?v=${DATA_VERSION}`,setLoadingProgress);
    tambonIndexArr=new Uint16Array(idxBuf);
    const lookupRes=await fetch(`data/tambon_lookup.json?v=${DATA_VERSION}`);
    if(lookupRes.ok) tambonLookup=await lookupRes.json();
  }catch(e){ console.warn('tambon_index.bin / tambon_lookup.json not found'); }
  finally{ setLoading(false); }
}

// ─────────────────────────────────────────────────────────────────────────────
//  Zonal statistics (click a จังหวัด/อำเภอ/ตำบล polygon -> area breakdown per layer)
// ─────────────────────────────────────────────────────────────────────────────
// Zonal membership is answered by tambon_index.bin -- the SAME per-cell
// province/district/tambon assignment already baked into Grid200m.shp
// (spatial-joined once, offline, in Python) -- rather than a live
// point-in-polygon test against the boundary line's own geometry. This
// guarantees the click-popup, Grid200m.shp, and this panel never disagree
// about which admin unit a cell belongs to (no more coastal/edge mismatches
// between independently-drawn boundary lines and the raster's own extent).
const RAI_PER_M2=1/1600;
function computeZonalStats(levelKey,code){
  if(!gridMeta||!gridBytes||!tambonIndexArr||!tambonLookup||code==null) return null;
  const key=levelKey==='p'?'p':levelKey==='d'?'d':'t';
  const matches=tambonLookup.filter(e=>e[key]===code);
  if(!matches.length) return null;

  const idxSet=new Set(matches.map(e=>e.i));
  const rowMin=Math.max(0,Math.min(...matches.map(e=>e.r0)));
  const rowMax=Math.min(gridMeta.NR-1,Math.max(...matches.map(e=>e.r1)));
  const colMin=Math.max(0,Math.min(...matches.map(e=>e.c0)));
  const colMax=Math.min(gridMeta.NC-1,Math.max(...matches.map(e=>e.c1)));

  const counts={LU:{},Alloc:{},Cons:{},F2:{},A2:{},U2:{},Ind2:{}};
  let total=0;
  for(let row=rowMin; row<=rowMax; row++){
    const rowBase=row*gridMeta.NC;
    for(let col=colMin; col<=colMax; col++){
      const off=rowBase+col;
      if(!idxSet.has(tambonIndexArr[off])) continue;
      total++;
      const goff=off*7;
      if(goff+6>=gridBytes.length) continue;
      const v=gridBytes.subarray(goff,goff+7);
      counts.Alloc[v[0]]=(counts.Alloc[v[0]]||0)+1;
      counts.F2[v[1]]=(counts.F2[v[1]]||0)+1;
      counts.A2[v[2]]=(counts.A2[v[2]]||0)+1;
      counts.U2[v[3]]=(counts.U2[v[3]]||0)+1;
      counts.Ind2[v[4]]=(counts.Ind2[v[4]]||0)+1;
      counts.Cons[v[5]]=(counts.Cons[v[5]]||0)+1;
      counts.LU[v[6]]=(counts.LU[v[6]]||0)+1;
    }
  }
  return {total,counts,cellAreaM2:gridMeta.CS*gridMeta.CS};
}

// sections start COLLAPSED by default (just a one-line highlight of the top
// category) -- only sections the user has explicitly expanded stay open
const zpExpandedSections=new Set();

function zpSection(title,counts,labelMap,colorMap,total){
  const entries=Object.entries(counts).map(([k,c])=>[Number(k),c]).sort((a,b)=>b[1]-a[1]);
  if(!entries.length) return '';
  const rows=entries.map(([k,c])=>{
    const pct=total?(c/total*100):0;
    const label=k===0?'ไม่มีข้อมูล':(labelMap[k]||`#${k}`);
    const color=k===0?'#3a4260':(colorMap[k]||'#666');
    return `<div class="zp-row">
        <span class="zp-dot" style="background:${color}"></span>
        <span class="zp-label">${label}</span>
        <span class="zp-pct">${pct.toFixed(1)}%</span>
      </div>
      <div class="zp-bar-track"><div class="zp-bar-fill" style="width:${pct}%;background:${color}"></div></div>`;
  }).join('');
  const collapsed=!zpExpandedSections.has(title);
  const [topK,topC]=entries[0];
  const topPct=total?(topC/total*100):0;
  const topLabel=topK===0?'ไม่มีข้อมูล':(labelMap[topK]||`#${topK}`);
  const topColor=topK===0?'#3a4260':(colorMap[topK]||'#666');
  return `<div class="zp-section${collapsed?' collapsed':''}">
      <div class="zp-section-title" onclick="toggleZpSection(this,'${title}')">
        <span class="zp-chevron">▾</span><span>${title}</span>
      </div>
      <div class="zp-top-summary" onclick="toggleZpSection(this.previousElementSibling,'${title}')">
        <span class="zp-dot" style="background:${topColor}"></span>
        <span class="zp-label">${topLabel}</span>
        <span class="zp-pct">${topPct.toFixed(1)}%</span>
      </div>
      <div class="zp-section-body">${rows}</div>
    </div>`;
}

function toggleZpSection(el,title){
  const sec=el.closest('.zp-section');
  const nowCollapsed=sec.classList.toggle('collapsed');
  if(nowCollapsed) zpExpandedSections.delete(title); else zpExpandedSections.add(title);
}

function closeZonalPanel(){
  document.getElementById('zonal-panel').classList.remove('open');
  zonalPinned=false;
}

function toggleZonalPin(){
  zonalPinned=!zonalPinned;
  const badge=document.getElementById('zp-pin-badge');
  if(badge){
    badge.classList.toggle('pinned',zonalPinned);
    badge.textContent=zonalPinned?'ล็อกอยู่':'ปักหมุด';
  }
}

let zonalPinned=false;
let zonalReqId=0;
let lastZonal=null; // {levelTitle,name,levelKey,code} of the last shown panel, so a
                     // dataset switch can recompute stats for the still-open selection
function showZonalStats(levelTitle,name,levelKey,code,fromClick){
  if(!gridMeta||!gridBytes||code==null) return;
  if(fromClick) zonalPinned=true;
  lastZonal={levelTitle,name,levelKey,code};
  const myId=++zonalReqId;
  const panel=document.getElementById('zonal-panel');
  panel.classList.add('open');
  panel.innerHTML=`<button class="zp-close" onclick="closeZonalPanel()">✕</button>
    <div class="zp-title">${levelTitle}: ${name}</div>
    <div class="zp-loading">กำลังคำนวณพื้นที่...</div>`;
  requestAnimationFrame(()=>{
    if(myId!==zonalReqId) return; // a newer hover/click already superseded this one
    const stats=computeZonalStats(levelKey,code);
    if(myId!==zonalReqId) return;
    const pinBadge=`<span id="zp-pin-badge" class="zp-pin-badge${zonalPinned?' pinned':''}" onclick="toggleZonalPin()">${zonalPinned?'ล็อกอยู่':'ปักหมุด'}</span>`;
    if(!stats||!stats.total){
      panel.innerHTML=`<button class="zp-close" onclick="closeZonalPanel()">✕</button>
        <div class="zp-title">${levelTitle}: ${name}</div>
        <div class="zp-sub">ไม่พบข้อมูลกริดในพื้นที่นี้ ${pinBadge}</div>`;
      return;
    }
    const totalRai=stats.total*stats.cellAreaM2*RAI_PER_M2;
    const totalKm2=stats.total*stats.cellAreaM2/1e6;
    panel.innerHTML=`
      <button class="zp-close" onclick="closeZonalPanel()">✕</button>
      <div class="zp-title">${levelTitle}: ${name}</div>
      <div class="zp-sub">
        <span>พื้นที่รวม ${totalRai.toLocaleString('th-TH',{maximumFractionDigits:0})} ไร่ (${totalKm2.toFixed(1)} ตร.กม.)</span>
        ${pinBadge}
      </div>
      ${zpSection('การใช้ที่ดินปัจจุบัน',stats.counts.LU,LU_LBL,LU_CLR,stats.total)}
      ${zpSection('การใช้ที่ดินตามศักยภาพ',stats.counts.Alloc,ALLOC_LBL,ALLOC_CLR,stats.total)}
      ${zpSection('ความสอดคล้อง',stats.counts.Cons,CONS_LBL,CONS_CLR,stats.total)}
      ${zpSection('ระดับความเหมาะสม ป่าไม้',stats.counts.F2,WO_LBL,WO_CLR,stats.total)}
      ${zpSection('ระดับความเหมาะสม เกษตร',stats.counts.A2,WO_LBL,WO_CLR,stats.total)}
      ${zpSection('ระดับความเหมาะสม เมืองและชุมชน',stats.counts.U2,WO_LBL,WO_CLR,stats.total)}
      ${zpSection('ระดับความเหมาะสม อุตสาหกรรม',stats.counts.Ind2,WO_LBL,WO_CLR,stats.total)}
    `;
  });
}

function queryGrid(lat,lng){
  if(!gridMeta||!gridBytes) return null;
  const[x,y]=proj4('EPSG:4326','EPSG:32647',[lng,lat]);
  const col=Math.floor((x-gridMeta.RXN)/gridMeta.CS);
  const row=Math.floor((gridMeta.RYX-y)/gridMeta.CS);
  if(col<0||col>=gridMeta.NC||row<0||row>=gridMeta.NR) return null;
  const off=(row*gridMeta.NC+col)*7;
  if(off+6>=gridBytes.length) return null;
  const v=gridBytes.subarray(off,off+7);
  return{row,col,Alloc:v[0],F2:v[1],A2:v[2],U2:v[3],Ind2:v[4],Cons:v[5],LU:v[6]};
}

function mkBadge(val,colorMap,labelMap){
  const c=colorMap[val]||'#555', l=labelMap[val]||'–';
  if(!val) return `<span style="color:#556">–</span>`;
  return `<span class="badge" style="background:${c}"><span class="badge-dot"></span>${l}</span>`;
}

async function handleGridClick(e){
  if(!gridMeta) return;
  const d=await queryGrid(e.latlng.lat,e.latlng.lng);
  const allZero=d&&!d.Alloc&&!d.F2&&!d.A2&&!d.U2&&!d.Ind2&&!d.Cons&&!d.LU;
  if(!d||allZero){
    L.popup({className:'dark-popup'}).setLatLng(e.latlng)
     .setContent(`<div class="gpopup-wrap"><div class="gpopup-title">กริด 200m</div>
       <span style="color:#556;font-size:12px">ไม่มีข้อมูลในพื้นที่นี้</span></div>`)
     .openOn(map);
    if(cellRect){map.removeLayer(cellRect);cellRect=null;}
    return;
  }
  // Highlight cell
  const cs=gridMeta.CS;
  const[bx0,by0]=proj4('EPSG:32647','EPSG:4326',[gridMeta.RXN+d.col*cs,     gridMeta.RYX-d.row*cs]);
  const[bx1,by1]=proj4('EPSG:32647','EPSG:4326',[gridMeta.RXN+(d.col+1)*cs, gridMeta.RYX-(d.row+1)*cs]);
  if(cellRect) map.removeLayer(cellRect);
  cellRect=L.rectangle([[by1,bx0],[by0,bx1]],{
    color:'#4f8ef7',weight:2,fill:true,fillColor:'#4f8ef7',fillOpacity:.12
  }).addTo(map);

  const html=`<div class="gpopup-wrap">
    <div class="gpopup-title">
      กริด 200m
      <span class="coord">row ${d.row} · col ${d.col}</span>
    </div>
    <table class="gp-table">
      <tr><td class="gp-field">การใช้ที่ดินปัจจุบัน</td><td>${mkBadge(d.LU,LU_CLR,LU_LBL)}</td></tr>
      <tr><td class="gp-field">การใช้ที่ดินตามศักยภาพ</td><td>${mkBadge(d.Alloc,ALLOC_CLR,ALLOC_LBL)}</td></tr>
      <tr><td class="gp-field">ความสอดคล้อง</td><td>${mkBadge(d.Cons,CONS_CLR,CONS_LBL)}</td></tr>
    </table>
    <div class="gp-suit-box">
      <table class="gp-table gp-table-sm">
        <tr><td class="gp-field">ระดับความเหมาะสม ป่าไม้</td><td>${mkBadge(d.F2,WO_CLR,WO_LBL)}</td></tr>
        <tr><td class="gp-field">ระดับความเหมาะสม เกษตร</td><td>${mkBadge(d.A2,WO_CLR,WO_LBL)}</td></tr>
        <tr><td class="gp-field">ระดับความเหมาะสม เมืองและชุมชน</td><td>${mkBadge(d.U2,WO_CLR,WO_LBL)}</td></tr>
        <tr><td class="gp-field">ระดับความเหมาะสม อุตสาหกรรม</td><td>${mkBadge(d.Ind2,WO_CLR,WO_LBL)}</td></tr>
      </table>
    </div>
  </div>`;
  L.popup({maxWidth:380,autoPan:true}).setLatLng(e.latlng).setContent(html).openOn(map);
}
map.on('click',handleGridClick);

map.on('popupclose',()=>{if(cellRect){map.removeLayer(cellRect);cellRect=null;}});

function setLoading(show,msg=''){
  const el=document.getElementById('loading');
  if(show){
    document.getElementById('load-msg').textContent=msg;
    setLoadingProgress(null);
    el.classList.remove('hidden');
  }else el.classList.add('hidden');
}

// frac: 0-1 for a real percentage, null for "size unknown" (indeterminate sliding bar)
function setLoadingProgress(frac){
  const wrap=document.getElementById('load-bar-wrap');
  const fill=document.getElementById('load-bar-fill');
  const pct=document.getElementById('load-pct');
  if(frac==null){
    wrap.classList.add('indeterminate');
    pct.textContent='';
  }else{
    wrap.classList.remove('indeterminate');
    const p=Math.min(1,Math.max(0,frac));
    fill.style.width=(p*100).toFixed(0)+'%';
    pct.textContent=Math.round(p*100)+'%';
  }
}

// Streams the response so we can report real byte progress (Content-Length
// permitting) instead of just spinning blind -- matters most for the ~50MB
// grid_attr.bin and the larger boundary geojsons.
async function fetchWithProgress(url,onProgress){
  const res=await fetch(url);
  if(!res.ok) throw new Error(res.status);
  if(!res.body){ onProgress(null); return await res.arrayBuffer(); }
  const total=Number(res.headers.get('Content-Length'))||0;
  const reader=res.body.getReader();
  const chunks=[];
  let loaded=0;
  while(true){
    const{done,value}=await reader.read();
    if(done) break;
    chunks.push(value);
    loaded+=value.length;
    onProgress(total?loaded/total:null);
  }
  const buf=new Uint8Array(loaded);
  let off=0;
  for(const c of chunks){ buf.set(c,off); off+=c.length; }
  return buf.buffer;
}

let tutorialStep=0;

function positionTutorial(){
  const step=TUTORIAL_STEPS[tutorialStep];
  const spotlight=document.getElementById('tutorial-spotlight');
  const tooltip=document.getElementById('tutorial-tooltip');
  const target=step.target?document.querySelector(step.target):null;

  if(!target){
    spotlight.classList.add('hidden');
    tooltip.style.left='50%';
    tooltip.style.top='90px';
    tooltip.style.transform='translateX(-50%)';
    return;
  }
  spotlight.classList.remove('hidden');
  tooltip.style.transform='none';
  target.scrollIntoView({block:'center'});
  requestAnimationFrame(()=>{
    const r=target.getBoundingClientRect();
    const pad=6;
    spotlight.style.top=(r.top-pad)+'px';
    spotlight.style.left=(r.left-pad)+'px';
    spotlight.style.width=(r.width+pad*2)+'px';
    spotlight.style.height=(r.height+pad*2)+'px';

    const narrow=window.innerWidth<860;
    if(narrow){
      tooltip.style.left='16px';
      tooltip.style.top=Math.max(16,Math.min(window.innerHeight-260,r.bottom+16))+'px';
    }else{
      const sidebarW=document.getElementById('sidebar').getBoundingClientRect().width;
      tooltip.style.left=(sidebarW+16)+'px';
      tooltip.style.top=Math.max(16,Math.min(r.top,window.innerHeight-260))+'px';
    }
  });
}

function renderTutorialStep(){
  const step=TUTORIAL_STEPS[tutorialStep];
  document.getElementById('tt-step-count').textContent=`ขั้นตอนที่ ${tutorialStep+1} / ${TUTORIAL_STEPS.length}`;
  document.getElementById('tt-title').textContent=step.title;
  document.getElementById('tt-body').textContent=step.body;
  document.getElementById('tt-prev').disabled=tutorialStep===0;
  document.getElementById('tt-next').textContent=tutorialStep===TUTORIAL_STEPS.length-1?'เริ่มใช้งาน':'ถัดไป';
  positionTutorial();
}

function startTutorial(){
  tutorialStep=0;
  document.getElementById('tutorial-overlay').classList.add('open');
  if(window.innerWidth<860 && !document.body.classList.contains('sidebar-open')) openSidebar();
  renderTutorialStep();
}

function endTutorial(){
  document.getElementById('tutorial-overlay').classList.remove('open');
}

document.getElementById('tt-next').addEventListener('click',()=>{
  if(tutorialStep===TUTORIAL_STEPS.length-1){ endTutorial(); return; }
  tutorialStep++;
  renderTutorialStep();
});
document.getElementById('tt-prev').addEventListener('click',()=>{
  if(tutorialStep===0) return;
  tutorialStep--;
  renderTutorialStep();
});
document.getElementById('tt-skip').addEventListener('click',endTutorial);
document.getElementById('tutorial-help-btn').addEventListener('click',startTutorial);
window.addEventListener('resize',()=>{
  if(document.getElementById('tutorial-overlay').classList.contains('open')) positionTutorial();
});

// ─────────────────────────────────────────────────────────────────────────────
(async()=>{
  buildSidebar();
  buildBoundList();
  buildSwipeControls();
  setLoading(false);
  await initGrid();
  if(gridMeta){
    const[x0,y0]=proj4('EPSG:32647','EPSG:4326',[gridMeta.RXN,gridMeta.RYX]);
    const[x1,y1]=proj4('EPSG:32647','EPSG:4326',[
      gridMeta.RXN+gridMeta.NC*gridMeta.CS,
      gridMeta.RYX-gridMeta.NR*gridMeta.CS
    ]);
    map.fitBounds([[y1,x0],[y0,x1]],{padding:[30,30]});
  }
  startTutorial();
})();
